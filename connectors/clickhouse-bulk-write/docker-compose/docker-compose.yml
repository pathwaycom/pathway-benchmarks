services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    # Pin ClickHouse to one CCD / shared-L3 group on the single NUMA node, exactly
    # as QuestDB is pinned in the QuestDB benchmark (README "Machine specs").
    cpuset: ${CLICKHOUSE_CPUSET:-0-5,12-17}
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-pathway}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-pathway}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/9000' || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-28123}:8123"

  pathway:
    build:
      context: ../services/pathway-all
    # Pin the engine to the other CCD / shared-L3 group, with enough cores for the
    # largest worker count being measured. Mirrors the QuestDB benchmark exactly.
    cpuset: ${PATHWAY_CPUSET:-6-11,18-23}
    environment:
      - DATASET_SIZE
      - PATHWAY_THREADS
      - PATHWAY_LICENSE_KEY
      - CLICKHOUSE_CONNECTION_STRING=tcp://${CLICKHOUSE_USER:-pathway}:${CLICKHOUSE_PASSWORD:-pathway}@clickhouse:9000/default
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ../datasets:/data:ro
