services:
  mysql:
    image: mysql:8.0
    # Pin MySQL to one CCD / shared-L3 group on the single NUMA node, exactly as
    # the database is pinned in the QuestDB/PostgreSQL benchmarks (README
    # "Machine specs").
    cpuset: ${MYSQL_CPUSET:-0-5,12-17}
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    # Same image and auth plugin as the Pathway integration-test suite, with
    # durability relaxed for write throughput. Under the stock config the connector's
    # bulk write is bounded by MySQL's per-commit redo-log fsync, which caps the whole
    # server regardless of Pathway workers (the write does not scale). Relaxing
    # durability lets the write scale across workers — see README "Server durability
    # and worker scaling". These settings trade crash-safety for throughput and are
    # appropriate for a benchmark rather than a production configuration.
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-flush-log-at-trx-commit=2
      --sync-binlog=0
      --innodb-doublewrite=0
      --innodb-buffer-pool-size=4G
      --innodb-redo-log-capacity=4G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -h 127.0.0.1 -P 3306 -uroot -prootpass testdb -e 'SELECT 1' >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 60s
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-23306}:3306"

  pathway:
    build:
      context: ../services/pathway-all
    # Pin the engine to the other CCD / shared-L3 group, with enough cores for
    # the largest worker count being measured. Mirrors the other benchmarks.
    cpuset: ${PATHWAY_CPUSET:-6-11,18-23}
    environment:
      - DATASET_SIZE
      - BATCH_SIZE
      - PATHWAY_THREADS
      - PATHWAY_LICENSE_KEY
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../../datasets-shared:/data:ro
