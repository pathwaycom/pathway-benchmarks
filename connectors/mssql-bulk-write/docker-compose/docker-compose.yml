services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    # Pin SQL Server to one CCD / shared-L3 group on the single NUMA node,
    # exactly as the database is pinned in the QuestDB/PostgreSQL benchmarks.
    cpuset: ${MSSQL_CPUSET:-0-5,12-17}
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: Developer
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -No -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 30s
    ports:
      - "127.0.0.1:${MSSQL_HOST_PORT:-21433}:1433"

  # Create the target database once SQL Server is healthy. Table creation /
  # replacement is handled by the connector (init_mode="replace").
  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        /opt/mssql-tools18/bin/sqlcmd -S mssql,1433 -U sa -P 'YourStrong!Passw0rd' -No -b
        -Q "IF DB_ID('testdb') IS NULL CREATE DATABASE testdb;"
    restart: "no"

  pathway:
    build:
      context: ../services/pathway-all
    # Pin the engine to the other CCD / shared-L3 group, with enough cores for
    # the largest worker count being measured. Mirrors the other benchmarks.
    cpuset: ${PATHWAY_CPUSET:-6-11,18-23}
    environment:
      - DATASET_SIZE
      - BATCH_SIZE
      - PATHWAY_THREADS
      - PATHWAY_LICENSE_KEY
    depends_on:
      mssql-init:
        condition: service_completed_successfully
    volumes:
      - ../../datasets-shared:/data:ro
